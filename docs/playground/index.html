<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tree-sitter-magma Playground</title>
    <style>
        body { font-family: monospace; margin: 2em; }
        textarea { width: 100%; height: 200px; font-family: monospace; font-size: 14px; }
        pre { background: #f5f5f5; padding: 1em; overflow: auto; max-height: 400px; }
    </style>
</head>
<body>
    <h1>tree-sitter-magma Playground</h1>
    <p>Enter Magma code below:</p>
    <textarea id="input">function test(x, y)
    return x + y;
end function;</textarea>
    <button onclick="parse()">Parse</button>
    <h2>Syntax Tree</h2>
    <pre id="output"></pre>
    <script type="module">
        import { Parser, Language } from 'https://unpkg.com/web-tree-sitter@0.25/tree-sitter.js';

        let parser;
        async function init() {
            await Parser.init();
            parser = new Parser();
            const Magma = await Language.load('./tree-sitter-magma.wasm');
            parser.setLanguage(Magma);
            window.parse = function() {
                const input = document.getElementById('input').value;
                const tree = parser.parse(input);
                document.getElementById('output').textContent = tree.rootNode.toString();
            };
            window.parse();
        }
        init();
    </script>
</body>
</html>
